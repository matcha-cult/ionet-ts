version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HTTP_PORT=8080
      - WS_PORT=9080
    ports:
      - '8080-8082:8080'
      - '9080-9082:9080'
    deploy:
      replicas: 3
    restart: unless-stopped

volumes:
  redis-data:
